version: "3.8"
services:
  ts-db:
    container_name: ts-db
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: komeya
    volumes:
      - ts-dbdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - ts-web
  ts-server:
    container_name: ts-server
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      DB_HOST: ts-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: komeya
      JWT_SECRET: change_me_in_env
    depends_on:
      - ts-db
    volumes:
      - ./server/src:/app/src
      - ./server/node_modules:/app/node_modules
      - ./uploads:/app/uploads
    networks:
      - ts-web
  ts-nginx:
    container_name: ts-nginx
    image: nginx:1.25
    volumes:
      - ./server/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server/certs:/etc/letsencrypt/live/threesquirrels.didigo.es:ro
      - ./:/usr/share/nginx/html:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - ts-server
    networks:
      - ts-web
volumes:
  ts-dbdata:
networks:
  ts-web:
    driver: bridge
