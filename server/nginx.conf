events {}
http {
  include mime.types;
  default_type application/octet-stream;
  client_max_body_size 20M;
  server {
    listen 80;
    listen 443 ssl;
    server_name threesquirrels.didigo.es;
    ssl_certificate /etc/letsencrypt/live/threesquirrels.didigo.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/threesquirrels.didigo.es/privkey.pem;
    root /usr/share/nginx/html;
    index index.html;
    location /api/ {
      proxy_pass http://ts-server:8080/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
